name: Pre-publish package checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  detect-package-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Detect package changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node .github/scripts/ci-helper.js detect --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Report detected package changes
        run: |
          if [ "${{ steps.detect.outputs.has_changes }}" = "true" ]; then
            echo "Detected package changes: ${{ steps.detect.outputs.changed }}"
          else
            echo "No package changes detected."
          fi
