name: Publish npm packages

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          registry-url: 'https://registry.npmjs.org'

      - name: Clean npm auth config
        run: rm -f ~/.npmrc .npmrc

      - name: Detect package changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
        run: |
          node .github/scripts/ci-helper.js detect --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Publish changed packages
        if: steps.detect.outputs.has_changes == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node .github/scripts/ci-helper.js publish --changed "${{ steps.detect.outputs.changed }}"
